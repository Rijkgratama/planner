function saveEditor(type, item) {
  const phase = phases.find(p => p.id === currentPhaseId);
  if (!phase) return;
  const title = (document.getElementById('ed-title').value || '').trim();
  if (!title) { document.getElementById('ed-title').focus(); toast('Give it a name'); return; }

  if (type === 'goal') {
    const date = document.getElementById('ed-date').value;
    if (!date) { document.getElementById('ed-date').focus(); toast('Set a date'); return; }
    const cat = document.getElementById('ed-cat').value;
    if (item) Object.assign(item, { title, date, cat });
    else phase.goals.push({ id: uid(), title, date, cat });
    rebuildAuto(phase);

  } else if (type === 'routine') {
    const min = +document.getElementById('ed-min').value || 1;
    const max = Math.max(min, +document.getElementById('ed-max').value || min);
    const cat = document.getElementById('ed-cat').value;
    const effort = +document.getElementById('ed-effort').value || EFFORT_DEFAULT;
    if (item) Object.assign(item, { title, cat, perWeekMin: min, perWeekMax: max, effort });
    else phase.routines.push({ id: uid(), title, cat, perWeekMin: min, perWeekMax: max, effort });

  } else if (type === 'appointment') {
    const date = document.getElementById('ed-date').value;
    if (!date) { document.getElementById('ed-date').focus(); toast('Set a date'); return; }
    const time = document.getElementById('ed-time').value || '';
    const cat = document.getElementById('ed-cat').value;
    if (item) Object.assign(item, { title, date, time, cat });
    else phase.appointments.push({ id: uid(), title, date, time, cat, done: false });
    rebuildAuto(phase);

  } else if (type === 'task') {
    const goalId = document.getElementById('ed-goal').value || null;
    const date   = document.getElementById('ed-date').value || null;
    const time   = (document.getElementById('ed-time') || {}).value || '';
    const effort = +document.getElementById('ed-effort').value || EFFORT_DEFAULT;
    if (item) {
      item.title = title; item.goalId = goalId; item.effort = effort; item.time = time;
      item.date = date; item.userPlaced = !!date;
    } else {
      phase.tasks.push({ id: uid(), title, goalId, effort, time, date: date || null, done: false, userPlaced: !!date });
    }
    rebuildAuto(phase);
  }

  save(); closeModal(); refreshCurrentView();
  toast(item ? 'Saved' : 'Added');
}

function deleteItem(type, item) {
  const phase = phases.find(p => p.id === currentPhaseId);
  if (!phase || !item) return;
  if (!confirm(`Delete "${item.title}"?`)) return;

  if (type === 'goal') {
    phase.goals = phase.goals.filter(x => x.id !== item.id);
    phase.tasks.forEach(t => { if (t.goalId === item.id) t.goalId = null; });
    rebuildAuto(phase);
  } else if (type === 'routine') {
    phase.routines = phase.routines.filter(x => x.id !== item.id);
    Object.keys(phase.routineLog || {}).forEach(k => { if (k.slice(0, k.lastIndexOf('|')) === item.id) delete phase.routineLog[k]; });
  } else if (type === 'appointment') {
    phase.appointments = phase.appointments.filter(x => x.id !== item.id);
  } else if (type === 'task') {
    phase.tasks = phase.tasks.filter(x => x.id !== item.id);
    rebuildAuto(phase);
  }
  save(); closeModal(); refreshCurrentView(); toast('Deleted');
}

// ── COACH (free AI planning assistant — OpenRouter free models) ─────────────

const COACH_SYSTEM = `You are the coach inside "Lock In Planner," a personal planning app. Act like a calm, supportive coach in the user's corner — warm, encouraging, never naggy. North star: help them have *doable* days while making sure their main goals still get done, and keep the other things that matter (exercise, chores, the dog) from being crowded out.

You receive the user's current planner as JSON: a phase (planning period with start/end), main goals with deadlines (often exams), weekly routines (times per week + effort in minutes), appointments, one-off tasks, the default study hours ("studyHoursDefault"), and a 7-day forecast of planned minutes per day (each day also lists its own "studyHours" window). Each study day is automatically filled with study for its focus goal across that window, so a longer window = a longer study day.

Advising:
- Be concise and practical — a few short paragraphs or bullets, not an essay.
- Protect the main goals first, especially near deadlines, but find balance.
- If a day looks too packed, gently suggest what to move.
- Reference specific weekdays/dates. Reason relative to the "today" date in the data.
- Never invent goals/tasks/dates not in the data; if something needed is missing, say so.

Changing the plan:
You CAN edit the planner. When the user asks you to add, move, or remove something, actually make the change by including a fenced \`\`\`json code block at the very END of your reply containing an "actions" array. First write a short, friendly confirmation in plain text, then the block. Only include the block when they truly want a change — for pure advice, omit it entirely.

Action schema (ISO dates YYYY-MM-DD, within the phase start..end; prefer lighter days from next7Days):
\`\`\`json
{"actions":[
  {"op":"add_task","title":"Run","day":"2026-06-12","effortMinutes":60,"goal":null},
  {"op":"add_appointment","title":"Dentist","date":"2026-06-12","time":"14:00"},
  {"op":"add_routine","title":"Stretch","timesPerWeek":3,"effortMinutes":15},
  {"op":"reschedule_task","title":"Run","day":"2026-06-13"},
  {"op":"set_study_hours","day":"2026-06-12","start":"09:00","end":"21:00"},
  {"op":"delete","kind":"task","title":"Run"}
]}
\`\`\`
Rules: "day" may be null to let the app auto-schedule a task. For exercise like a run, use add_task (or add_routine if it recurs weekly). Match existing items by their exact title for reschedule/delete. "goal" (optional) is a main-goal title to link a task to.
Use set_study_hours to make a study day longer or shorter (the user might say "study later on Friday", "give me an extra two hours Thursday", "shorter study day Monday"). Compute the new clock times from the day's current "studyHours" — e.g. two hours longer than an 8:00-18:00 day means end "20:00". Provide "start" and/or "end" as "HH:MM" (24h). Include "day" (ISO) to change just that day; omit "day" to change every day's default.
Keep the JSON minimal and valid. Don't mention the JSON block in your prose — just confirm naturally (e.g. "Done — I've stretched Thursday's study to 8:00-20:00 so you get the extra two hours.").`;

let coachState = { answer: '', error: '', loading: false, question: '' };

// Free hosted coach via OpenRouter — free models, OpenAI-compatible, browser-friendly (CORS *).
const COACH_KEY_LS = 'lockin:openrouter-key';
const COACH_MODEL_LS = 'lockin:openrouter-model';
function getKey()    { try { return localStorage.getItem(COACH_KEY_LS) || ''; } catch (e) { return ''; } }
function setKey(v)   { try { localStorage.setItem(COACH_KEY_LS, v); } catch (e) {} }
function clearKey()  { try { localStorage.removeItem(COACH_KEY_LS); } catch (e) {} }
function getModel()  { try { return localStorage.getItem(COACH_MODEL_LS) || ''; } catch (e) { return ''; } }
function setModel(v) { try { localStorage.setItem(COACH_MODEL_LS, v); } catch (e) {} }

const OR_API = 'https://openrouter.ai/api/v1';
// Preferred free models for the structured "actions" output, best first; falls back to whatever
// free models are available if none of these exist.
const OR_PREFER = ['moonshotai/kimi-k2.6:free', 'google/gemma-4-31b-it:free', 'meta-llama/llama-3.3-70b-instruct:free', 'qwen/qwen-2.5-72b-instruct:free', 'deepseek/deepseek-chat:free'];
let orFreeModels = null;   // [{id,label}] once loaded
let orPicked = '';         // resolved default when the user hasn't chosen one
async function loadFreeModels() {
  if (orFreeModels) return orFreeModels;
  try {
    const res = await fetch(`${OR_API}/models`);
    if (res.ok) {
      const data = await res.json();
      orFreeModels = (data.data || []).filter(m => String(m.id).endsWith(':free'))
        .map(m => ({ id: m.id, label: (m.name || m.id).replace(/\s*\(free\)\s*/i, '').trim() }))
        .sort((a, b) => a.label.localeCompare(b.label));
    }
  } catch (e) {}
  if (!orFreeModels) orFreeModels = [];
  return orFreeModels;
}
async function pickModel() {
  const chosen = getModel(); if (chosen) return chosen;
  if (orPicked) return orPicked;
  const list = await loadFreeModels();
  for (const p of OR_PREFER) { if (list.find(m => m.id === p)) { orPicked = p; return p; } }
  orPicked = (list[0] && list[0].id) || 'meta-llama/llama-3.3-70b-instruct:free';
  return orPicked;
}

async function callOpenRouter(phase, q) {
  const model = await pickModel();
  const body = {
    model, temperature: 0.6, max_tokens: 2048,
    messages: [
      { role: 'system', content: COACH_SYSTEM },
      { role: 'user', content: `My current planner data (JSON):\n\n${JSON.stringify(buildCoachContext(phase))}\n\n${q}` },
    ],
  };
  try {
    const res = await fetch(`${OR_API}/chat/completions`, {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'authorization': 'Bearer ' + getKey(),
        'HTTP-Referer': location.origin,
        'X-Title': 'Lock In Planner',
      },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      let msg = `Request failed (${res.status}).`;
      if (res.status === 401 || res.status === 403) msg = 'That key was rejected. Check it at openrouter.ai/keys.';
      else if (res.status === 429) msg = 'Rate limited — free models have daily limits. Wait a bit, or pick a different free model below.';
      else { try { const e = await res.json(); if (e && e.error && e.error.message) msg = 'Error: ' + e.error.message; } catch (_) {} }
      return { ok: false, error: msg };
    }
    const data = await res.json();
    const text = ((data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '').trim();
    if (!text) return { ok: false, error: 'Empty response — try another free model below, or rephrase.' };
    return { ok: true, text };
  } catch (err) {
    return { ok: false, error: 'Could not reach OpenRouter (network). Are you online?' };
  }
}

// Compact snapshot of the phase for the model to reason over.
function buildCoachContext(phase) {
  const today = todayISO();
  const routinePlan = computeRoutinePlan(phase);
  const next7 = [];
  const d = new Date(today + 'T00:00:00');
  for (let i = 0; i < 7; i++) {
    const iso = isoFromDate(d); d.setDate(d.getDate() + 1);
    if (iso < phase.start || iso > phase.end) continue;
    const sw = studyWindow(phase, iso);
    next7.push({
      date: iso,
      weekday: fmtWeekday(iso),
      plannedMinutes: Math.round(dayLoad(phase, iso, routinePlan)),
      studyHours: `${minToHM(sw.start)}-${minToHM(sw.end)}`,
    });
  }
  const defS = hmToMin(phase.studyStart), defE = hmToMin(phase.studyEnd);
  const goalTitle = id => { const g = (phase.goals || []).find(x => x.id === id); return g ? g.title : null; };
  return {
    today,
    phase: { title: phase.title, start: phase.start, end: phase.end },
    studyHoursDefault: `${minToHM(defS != null ? defS : STUDY_DEF_START)}-${minToHM(defE != null ? defE : STUDY_DEF_END)}`,
    goals: (phase.goals || []).map(g => ({ title: g.title, deadline: g.date, daysLeft: daysUntil(g.date) })),
    routines: (phase.routines || []).map(r => ({
      title: r.title,
      perWeek: r.perWeekMin === r.perWeekMax ? `${r.perWeekMax}` : `${r.perWeekMin}-${r.perWeekMax}`,
      effortMinutes: effortMinutes(r.effort),
    })),
    appointments: (phase.appointments || []).filter(a => a.date >= today)
      .map(a => ({ title: a.title, date: a.date, time: a.time || null })),
    tasks: (phase.tasks || []).map(t => ({
      title: t.title, goal: t.goalId ? goalTitle(t.goalId) : null,
      day: t.date || 'unscheduled', done: !!t.done, effortMinutes: effortMinutes(t.effort),
    })),
    next7Days: next7,
  };
}

// ── Coach actions: the model can propose changes; we apply them to the planner ──
function isValidDate(s) { return typeof s === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(s); }

// Pull a fenced ```json {actions:[...]} ``` block out of the reply, if present.
function parseActions(text) {
  const m = String(text).match(/```(?:json)?\s*([\s\S]*?)```/i);
  if (!m) return { actions: [], clean: String(text).trim() };
  let obj = null;
  try { obj = JSON.parse(m[1].trim()); } catch (e) { return { actions: [], clean: String(text).trim() }; }
  const actions = obj && Array.isArray(obj.actions) ? obj.actions : (Array.isArray(obj) ? obj : []);
  const clean = String(text).replace(m[0], '').trim();
  return { actions, clean };
}

// Apply the actions to the phase; return a human-readable list of what changed.
function applyCoachActions(phase, actions) {
  const done = [];
  const byTitle = (arr, name) => (arr || []).find(x => name && x.title.toLowerCase() === String(name).toLowerCase());
  for (const a of actions) {
    if (!a || !a.op) continue;
    try {
      if (a.op === 'add_task') {
        const g = a.goal ? byTitle(phase.goals, a.goal) : null;
        const date = isValidDate(a.day) ? a.day : null;
        phase.tasks.push({ id: uid(), title: String(a.title || 'Task'), goalId: g ? g.id : null, effort: +a.effortMinutes || EFFORT_DEFAULT, date, done: false, userPlaced: !!date });
        done.push(`Added task “${a.title}”${date ? ` on ${fmtMed(date)}` : ' (auto-scheduled)'}`);
      } else if (a.op === 'add_appointment') {
        if (!isValidDate(a.date)) continue;
        phase.appointments.push({ id: uid(), title: String(a.title || 'Appointment'), date: a.date, time: a.time || '', cat: (a.cat && CATS[a.cat]) ? a.cat : 'appt', done: false });
        done.push(`Added appointment “${a.title}” on ${fmtMed(a.date)}${a.time ? ` at ${a.time}` : ''}`);
      } else if (a.op === 'add_routine') {
        const n = Math.max(1, parseInt(a.timesPerWeek, 10) || 1);
        phase.routines.push({ id: uid(), title: String(a.title || 'Routine'), cat: (a.cat && CATS[a.cat]) ? a.cat : 'sport', perWeekMin: n, perWeekMax: n, effort: +a.effortMinutes || EFFORT_DEFAULT });
        done.push(`Added routine “${a.title}” ${n}×/week`);
      } else if (a.op === 'reschedule_task') {
        const t = byTitle(phase.tasks, a.title);
        if (t && isValidDate(a.day)) { t.date = a.day; t.userPlaced = true; done.push(`Moved “${t.title}” to ${fmtMed(a.day)}`); }
      } else if (a.op === 'set_study_hours') {
        const norm = v => { const m = hmToMin(v); return m == null ? null : minToHM(m); };
        const start = norm(a.start), end = norm(a.end);
        if (start == null && end == null) continue;
        if (isValidDate(a.day)) {
          phase.dayStudy = phase.dayStudy || {};
          const cur = Object.assign({}, phase.dayStudy[a.day]);
          if (start != null) cur.start = start;
          if (end != null) cur.end = end;
          phase.dayStudy[a.day] = cur;
          const w = studyWindow(phase, a.day);
          done.push(`Set study hours on ${fmtMed(a.day)} to ${minToHM(w.start)}–${minToHM(w.end)}`);
        } else {
          if (start != null) phase.studyStart = start;
          if (end != null) phase.studyEnd = end;
          const ws = hmToMin(phase.studyStart), we = hmToMin(phase.studyEnd);
          done.push(`Set default study hours to ${minToHM(ws != null ? ws : STUDY_DEF_START)}–${minToHM(we != null ? we : STUDY_DEF_END)}`);
        }
      } else if (a.op === 'delete') {
        const kind = a.kind || 'task';
        const arr = kind === 'appointment' ? phase.appointments : kind === 'routine' ? phase.routines : phase.tasks;
        const item = byTitle(arr, a.title);
        if (item) {
          if (kind === 'appointment') phase.appointments = phase.appointments.filter(x => x !== item);
          else if (kind === 'routine') phase.routines = phase.routines.filter(x => x !== item);
          else phase.tasks = phase.tasks.filter(x => x !== item);
          done.push(`Removed ${kind} “${a.title}”`);
        }
      }
    } catch (e) {}
  }
  if (done.length) { rebuildAuto(phase); save(); }
  return done;
}

// Finish a coach turn: parse + apply any actions, then show the cleaned answer.
function finishCoach(phase, rawText) {
  const { actions, clean } = parseActions(rawText);
  const applied = actions.length ? applyCoachActions(phase, actions) : [];
  let finalText = clean;
  if (applied.length) finalText += (finalText ? '\n\n' : '') + '**Updated your plan:**\n' + applied.map(s => '- ' + s).join('\n');
  if (!finalText) finalText = rawText;
  coachState.answer = finalText; coachState.streaming = false; coachState.loading = false;
  if (applied.length) { toast('Plan updated'); renderPhase(); }   // refresh calendar + coach panel
  else renderCoachBody(phase);
}

async function askCoach(phase, q) {
  if (!getKey()) return;
  q = (q || '').trim() || 'Plan my week and tell me if anything looks too full.';
  coachState = { question: q, answer: '', error: '', loading: true };
  renderCoachBody(phase);
  const r = await callOpenRouter(phase, q);
  if (!r.ok) { coachState.loading = false; coachState.error = r.error; renderCoachBody(phase); return; }
  finishCoach(phase, r.text);
}

// Tiny markdown → HTML (bold, inline code, bullets, headings). Escapes first.
function mdToHtml(src) {
  const esc = s => s.replace(/[&<>]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[c]));
  const inline = s => esc(s).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/`(.+?)`/g, '<code>$1</code>');
  let html = '', inList = false;
  for (const raw of String(src).split('\n')) {
    const line = raw.trimEnd();
    const bullet = line.match(/^\s*[-*]\s+(.*)$/);
    const heading = line.match(/^#{1,6}\s+(.*)$/);
    if (bullet) { if (!inList) { html += '<ul>'; inList = true; } html += '<li>' + inline(bullet[1]) + '</li>'; }
    else { if (inList) { html += '</ul>'; inList = false; }
      if (heading) html += '<h4>' + inline(heading[1]) + '</h4>';
      else if (line !== '') html += '<p>' + inline(line) + '</p>'; }
  }
  if (inList) html += '</ul>';
  return html;
}

function coachOutHtml() {
  if (coachState.loading) return `<div class="coach-out loading" id="coach-out">Thinking<span class="coach-typing"><span></span><span></span><span></span></span></div>`;

}

function wireCoach(phase) {
  const save = document.getElementById('coach-key-save');
  if (save) {
    const inp = document.getElementById('coach-key');
    const doSave = () => { const v = (inp.value || '').trim(); if (!v) { inp.focus(); return; } setKey(v); coachState = { question: '', answer: '', error: '', loading: false }; renderCoachBody(phase); toast('Coach connected'); };
    save.onclick = doSave;
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') doSave(); });
  }
  const ask = document.getElementById('coach-ask');
  if (ask) ask.onclick = () => askCoach(phase, (document.getElementById('coach-input') || {}).value || '');
  const input = document.getElementById('coach-input');
  if (input) input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); askCoach(phase, input.value); } });
  const more = document.getElementById('coach-more');
  if (more) more.onclick = () => { const s = document.getElementById('coach-settings'); if (s) s.classList.toggle('open'); };
  const ms = document.getElementById('coach-model');
  if (ms) ms.onchange = () => setModel(ms.value);
  const forget = document.getElementById('coach-forget');
  if (forget) forget.onclick = () => { if (confirm('Remove your saved key from this browser?')) { clearKey(); coachState = { question: '', answer: '', error: '', loading: false }; renderCoachBody(phase); } };
  // Lazily load the free-model list once a key is present, then re-render to show the picker.
  if (getKey() && !orFreeModels) loadFreeModels().then(() => { if (getKey() && document.getElementById('coach-body')) renderCoachBody(phase); });
}

// ── DAY TIMELINE (hour-by-hour plan, like a calendar day view) ──────────────
function hmToMin(t) { const m = /^(\d{1,2}):(\d{2})$/.exec(t || ''); return m ? (+m[1]) * 60 + (+m[2]) : null; }
function minToHM(m) { const h = Math.floor(m / 60), mm = m % 60; return `${h}:${String(mm).padStart(2, '0')}`; }

// How long each study day runs. Default 8:00–18:00; the coach (or future UI) can stretch it
// per day via phase.dayStudy[iso] = {start,end} or shift the default via phase.studyStart/End.
const STUDY_DEF_START = 8 * 60, STUDY_DEF_END = 18 * 60;
function studyWindow(phase, iso) {
  const ds = (phase && phase.dayStudy && phase.dayStudy[iso]) || {};
  const dStart = hmToMin(phase && phase.studyStart), dEnd = hmToMin(phase && phase.studyEnd);
  let start = hmToMin(ds.start); if (start == null) start = (dStart != null ? dStart : STUDY_DEF_START);
  let end   = hmToMin(ds.end);   if (end   == null) end   = (dEnd   != null ? dEnd   : STUDY_DEF_END);
  start = Math.max(0, Math.min(start, 23 * 60));
  end = Math.max(start + 30, Math.min(end, 24 * 60));
  return { start, end };
}

// Build a concrete by-the-hour plan: appointments sit at their clock time; tasks and
// routine sessions (which have a duration but no set time) are poured into the open slots.
function buildDayTimeline(phase, iso, routinePlan, colorMap, dayPlan) {
  const ROW = 56, MIN_BLOCK = 24, DAY_START = 8 * 60, DAY_END = 23 * 60;
  const rLog = phase.routineLog || {};
  const items = [];
  (phase.appointments || []).filter(a => a.date === iso).forEach(a => {
    const start = hmToMin(a.time);
    items.push({ type: 'appt', id: a.id, title: a.title, cat: a.cat || 'appt', done: !!a.done, fixed: start != null, start, dur: Math.max(15, +a.durationMin || 60) });
  });
  (phase.tasks || []).filter(t => t.date === iso).forEach(t => {
    const start = hmToMin(t.time);
    items.push({ type: 'task', id: t.id, title: t.title, goalId: t.goalId, done: !!t.done, fixed: start != null, start, dur: Math.max(10, effortMinutes(t.effort)) });
  });
  (routinePlan[iso] || []).forEach(rid => {
    const r = (phase.routines || []).find(x => x.id === rid); if (!r) return;
    const st = rLog[`${rid}|${iso}`];
    items.push({ type: 'routine', id: rid, title: r.title, cat: r.cat || 'sport', done: st === 'done', skip: st === 'skip', fixed: false, start: null, dur: Math.max(10, effortMinutes(r.effort)) });
  });

  // Free time left by the fixed (timed) appointments, then pour untimed items in.
  const fixed = items.filter(i => i.fixed);
  const freeAround = (s0, e0, blocks) => {
    const bs = blocks.slice().sort((a, b) => a.s - b.s); const free = []; let c = s0;
    bs.forEach(b => { const a = Math.max(s0, b.s), z = Math.min(e0, b.e); if (a > c) free.push({ s: c, e: a }); c = Math.max(c, z); });
    if (c < e0) free.push({ s: c, e: e0 }); return free;
  };
  const freeIv = freeAround(DAY_START, DAY_END, fixed.map(f => ({ s: f.start, e: f.start + f.dur })));
  let fi = 0, cursor = freeIv.length ? freeIv[0].s : DAY_START;
  const placeDur = (dur) => {
    while (fi < freeIv.length) {
      if (cursor < freeIv[fi].s) cursor = freeIv[fi].s;
      if (cursor + dur <= freeIv[fi].e) { const s = cursor; cursor += dur; return s; }
      fi++; if (fi < freeIv.length) cursor = freeIv[fi].s;
    }
    return null;
  };
  const overflow = [];
  items.filter(i => !i.fixed).forEach(it => { const s = placeDur(it.dur); if (s != null) it.start = s; else overflow.push(it); });

  // Fully plan each study day: fill the day (around commitments) with study for its focus
  // goal, in ~2h chunks across the study window. Computed live, so commitments push study
  // aside; the window (and so a longer/shorter study day) comes from studyWindow().
  const sw = studyWindow(phase, iso);
  const STUDY_START = sw.start, STUDY_END = sw.end, STUDY_CHUNK = 120;
  const focusId = (dayPlan && dayPlan[iso] && !String(dayPlan[iso]).startsWith('exam:') && iso >= todayISO()) ? dayPlan[iso] : null;
  const focusGoal = focusId ? (phase.goals || []).find(g => g.id === focusId) : null;
  const studyBlocks = [];
  if (focusGoal) {
    // Don't start study before the window opens (skip earlier free gaps).
    while (fi < freeIv.length && Math.max(cursor, freeIv[fi].s) < STUDY_START && freeIv[fi].e <= STUDY_START) { fi++; if (fi < freeIv.length) cursor = freeIv[fi].s; }
    if (cursor < STUDY_START) cursor = STUDY_START;
    while (fi < freeIv.length) {
      if (cursor < freeIv[fi].s) cursor = freeIv[fi].s;
      if (cursor >= STUDY_END) break;
      const segEnd = Math.min(freeIv[fi].e, STUDY_END);
      let s = cursor;
      while (segEnd - s >= 10) {
        const chunk = Math.min(STUDY_CHUNK, segEnd - s);
        studyBlocks.push({ type: 'study', goalId: focusId, title: `Study · ${focusGoal.title}`, start: s, dur: chunk });
        s += chunk;
      }
      cursor = segEnd;
      if (cursor >= freeIv[fi].e) { fi++; if (fi < freeIv.length) cursor = freeIv[fi].s; }
    }
  }

  const placed = items.filter(i => i.start != null).concat(studyBlocks);
  let minS = DAY_START, maxE = DAY_END;
  placed.forEach(b => { minS = Math.min(minS, b.start); maxE = Math.max(maxE, b.start + b.dur); });
  const rangeStart = Math.max(0, Math.floor(minS / 60) * 60);
  const rangeEnd = Math.min(24 * 60, Math.ceil(maxE / 60) * 60);

  // Column layout so overlapping blocks sit side by side.
  const sorted = placed.slice().sort((a, b) => a.start - b.start || b.dur - a.dur);
  let clusters = [], cl = null, clEnd = -1;
  sorted.forEach(b => {
    if (!cl || b.start >= clEnd) { cl = { cols: [], blocks: [] }; clusters.push(cl); clEnd = b.start + b.dur; }
    let col = 0; while (col < cl.cols.length && cl.cols[col] > b.start) col++;
    cl.cols[col] = b.start + b.dur; b._col = col; cl.blocks.push(b);
    clEnd = Math.max(clEnd, b.start + b.dur);
  });
  clusters.forEach(c => c.blocks.forEach(b => b._cols = c.cols.length));

  const blockColor = (b) => {
    if (b.type === 'task' || b.type === 'study') {
      if (b.goalId != null && colorMap[b.goalId] != null) { const c = GOAL_PALETTE[colorMap[b.goalId] % GOAL_PALETTE.length]; return { c: c.color, bg: c.bg }; }
      return b.type === 'study' ? { c: 'var(--c-study)', bg: 'var(--c-study-bg)' } : { c: '#5B6472', bg: '#EEF1F5' };
    }
    const cc = CATS[b.cat]; return { c: cc ? cc.color : 'var(--muted)', bg: cc ? cc.bg : 'var(--surface-2)' };
  };
  const editAttr = (b) => b.type === 'task' ? `data-edit-task="${b.id}"` : b.type === 'appt' ? `data-edit-appt="${b.id}"` : b.type === 'routine' ? `data-edit-routine="${b.id}"` : '';
  const checkAttr = (b) => b.type === 'task' ? `data-check-task="${b.id}"` : b.type === 'appt' ? `data-check-appt="${b.id}"` : `data-check-rt="${b.id}"`;

  const blocksHTML = placed.map(b => {
    const top = (b.start - rangeStart) / 60 * ROW;
    const height = Math.max(MIN_BLOCK, b.dur / 60 * ROW - 3);
    const wPct = 100 / b._cols, leftPct = b._col * wPct;
    const { c, bg } = blockColor(b);
    const tall = height >= 42;
    return `<div class="tl-block type-${b.type}${b.done ? ' is-done' : ''}${b.skip ? ' is-skip' : ''}${tall ? ' tall' : ''}"
      style="top:${top}px;height:${height}px;left:calc(${leftPct}% + 1px);width:calc(${wPct}% - 3px);--bc:${c};--bg:${bg}" data-start="${b.start}" data-dur="${b.dur}" ${editAttr(b)}>
      ${b.type === 'study' ? '' : `<button class="tl-check" ${checkAttr(b)} aria-label="Mark done">${svgCheck()}</button>`}
      ${tall ? `<div class="tl-b-time">${minToHM(b.start)}–${minToHM(b.start + b.dur)}</div>` : ''}
      <div class="tl-b-title">${escapeHtml(b.title)}</div>
    </div>`;
  }).join('');

  let lines = '';
  for (let m = rangeStart; m <= rangeEnd; m += 60) {
    lines += `<div class="tl-hour" style="top:${(m - rangeStart) / 60 * ROW}px"><span class="tl-hlabel">${minToHM(m)}</span><span class="tl-hline"></span></div>`;
  }

  const anytime = overflow.length ? `<div class="tl-anytime">
    <div class="tl-anytime-h">No room on the clock — fit in anytime:</div>
    ${overflow.map(b => `<div class="tl-any-row${b.done ? ' is-done' : ''}" ${editAttr(b)}>
      <button class="tl-check" ${checkAttr(b)} aria-label="Mark done">${svgCheck()}</button>
      <span class="tl-any-title">${escapeHtml(b.title)}</span><span class="tl-any-dur">${fmtDur(b.dur)}</span>
    </div>`).join('')}
  </div>` : '';

  const scrollTop = Math.max(0, (minS - rangeStart) / 60 * ROW - 6);
  const H = (rangeEnd - rangeStart) / 60 * ROW + 8;
  return `${anytime}<div class="timeline" data-scroll="${Math.round(scrollTop)}"><div class="tl-inner" data-range-start="${rangeStart}" data-range-end="${rangeEnd}" style="height:${H}px">${lines}<div class="tl-blocks">${blocksHTML}</div></div></div>`;
}

// ── DAY VIEW ───────────────────────────────────────────────────────────────

let dayAnimDir = 0;   // 1 = slid to next day, -1 = previous (drives the slide animation)
function goToDay(dir) {
  const phase = phases.find(p => p.id === currentPhaseId);
  if (!phase || !currentDayISO) return;
  const d = new Date(currentDayISO + 'T00:00:00'); d.setDate(d.getDate() + dir);
  const iso = isoFromDate(d);
  if (iso < phase.start || iso > phase.end) return;   // stay within the phase
  dayAnimDir = dir; currentDayISO = iso; renderDay();
}

function renderDay() {
  const phase = phases.find(p => p.id === currentPhaseId);
  if (!phase || !currentDayISO) { showView('phase'); return; }

  const iso      = currentDayISO;
  const daysAway = daysUntil(iso);
  const weekday  = fmtWeekday(iso);

  document.getElementById('day-title-bar').textContent = weekday;

  // Day plan info
  const dayPlan     = computeDayPlan(phase);
  const colorMap    = buildGoalColorMap(phase);
  const routinePlan = computeRoutinePlan(phase);
  const entry    = dayPlan[iso];
  let studyTagHTML = '';
  if (entry) {
    const isExam = entry.startsWith('exam:');
    const gid    = isExam ? entry.slice(5) : entry;
    const goal   = (phase.goals||[]).find(g => g.id === gid);
    if (goal) {
      const ci  = colorMap[gid] ?? 0;
      const col = GOAL_PALETTE[ci % GOAL_PALETTE.length];
      const label = isExam ? `Exam day: ${goal.title}` : `Study focus: ${goal.title}`;
      studyTagHTML = `<div class="day-goal-tag" style="background:${col.bg};color:${col.color}">
        <span class="day-goal-dot" style="background:${col.color}"></span>${escapeHtml(label)}
      </div>`;
    }
  }

  // Deadlines on this day
  const goalsToday = (phase.goals||[]).filter(g => g.date === iso);
  const deadlineHTML = goalsToday.length === 0 ? '' : `
    <div class="panel">
      <div class="panel-title">Deadlines today</div>
      ${goalsToday.map(g => {
        const days = daysUntil(g.date);
        const ci   = colorMap[g.id] ?? 0;
        const col  = GOAL_PALETTE[ci % GOAL_PALETTE.length];
        return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)">
          <span class="goal-color-dot" style="background:${col.color};width:13px;height:13px"></span>
          <strong style="flex:1;font-size:15px">${escapeHtml(g.title)}</strong>
          <span class="countdown-badge ${urgencyClass(days)}">${urgencyLabel(days)}</span>
        </div>`;
      }).join('')}
    </div>`;

  const timelineHTML = buildDayTimeline(phase, iso, routinePlan, colorMap, dayPlan);

  document.getElementById('day-content').innerHTML = `
    <div class="day-hero">
      <div class="day-head">
        <button class="day-arrow" id="day-prev"${iso <= phase.start ? ' disabled' : ''} aria-label="Previous day">‹</button>
        <div class="day-head-mid">
          <div class="day-name">${weekday}</div>
          <div class="day-date-full">${fmtDayFull(iso)}${iso === todayISO() ? ' · Today' : ''}</div>
        </div>
        <button class="day-arrow" id="day-next"${iso >= phase.end ? ' disabled' : ''} aria-label="Next day">›</button>
      </div>
      ${studyTagHTML}
    </div>
    ${deadlineHTML}
    <div class="panel">
      <div class="panel-title">Day plan <span class="hint ml">by the hour</span></div>
      ${timelineHTML}
      <button class="btn ghost wide" id="day-add-task" style="margin-top:12px">+ Add a task to this day</button>
    </div>
  `;

  const dc = document.getElementById('day-content');
  // Slide animation when moving between days.
  dc.classList.remove('slide-next', 'slide-prev');
  if (dayAnimDir) { void dc.offsetWidth; dc.classList.add(dayAnimDir > 0 ? 'slide-next' : 'slide-prev'); dayAnimDir = 0; }
  dc.querySelector('#day-add-task').onclick = () => openEditor('task', null, iso);
  const pv = dc.querySelector('#day-prev'); if (pv) pv.onclick = () => goToDay(-1);
  const nx = dc.querySelector('#day-next'); if (nx) nx.onclick = () => goToDay(1);

  // Scroll the timeline to the first block / morning.
  const tl = dc.querySelector('.timeline'); if (tl) tl.scrollTop = +tl.dataset.scroll || 0;

  // Block check buttons (don't open the editor — stop the click bubbling).
  dc.querySelectorAll('.tl-check').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      if (btn.dataset.checkTask)      { const t = phase.tasks.find(x => x.id === btn.dataset.checkTask); if (t) { t.done = !t.done; save(); renderDay(); } }
      else if (btn.dataset.checkAppt) { const a = phase.appointments.find(x => x.id === btn.dataset.checkAppt); if (a) { a.done = !a.done; save(); renderDay(); } }
      else if (btn.dataset.checkRt)   { const k = `${btn.dataset.checkRt}|${iso}`; if (phase.routineLog[k] === 'done') delete phase.routineLog[k]; else phase.routineLog[k] = 'done'; save(); renderDay(); }
    };
  });

  // Tasks & appointments: drag vertically to set a time (or click to edit).
  dc.querySelectorAll('.tl-block.type-task, .tl-block.type-appt').forEach(el => wireBlockDrag(el, phase, iso));
  // Routine blocks + "anytime" rows: click to edit (not draggable).
  dc.querySelectorAll('.tl-block.type-routine, .tl-any-row').forEach(el => {
    el.onclick = (e) => {
      if (e.target.closest('.tl-check')) return;
      if (el.dataset.editTask)         { const t = phase.tasks.find(x => x.id === el.dataset.editTask); if (t) openEditor('task', t); }
      else if (el.dataset.editAppt)    { const a = phase.appointments.find(x => x.id === el.dataset.editAppt); if (a) openEditor('appointment', a); }
      else if (el.dataset.editRoutine) { const r = phase.routines.find(x => x.id === el.dataset.editRoutine); if (r) openEditor('routine', r); }
    };
  });
}

// Drag a timeline block to set its clock time; a plain click (no drag) opens the editor.
function wireBlockDrag(el, phase, iso) {
  const isTask = !!el.dataset.editTask;
  const id = el.dataset.editTask || el.dataset.editAppt;
  if (!id) return;
  el.style.cursor = 'grab';
  el.style.touchAction = 'none';
  el.addEventListener('pointerdown', (e) => {
    if (e.button !== 0 || e.target.closest('.tl-check')) return;
    const inner = el.closest('.tl-inner'); if (!inner) return;
    const rangeStart = +inner.dataset.rangeStart, rangeEnd = +inner.dataset.rangeEnd, ROW = 56;
    const dur = +el.dataset.dur, origTop = parseFloat(el.style.top) || 0, startY = e.clientY;
    let moved = false, newStart = +el.dataset.start;
    el.setPointerCapture(e.pointerId);
    el.classList.add('dragging');
    const onMove = (ev) => {
      const dy = ev.clientY - startY;
      if (Math.abs(dy) > 3) moved = true;
      let mins = rangeStart + ((origTop + dy) / ROW) * 60;
      mins = Math.round(mins / 15) * 15;
      mins = Math.max(rangeStart, Math.min(mins, rangeEnd - dur));
      newStart = mins;
      el.style.top = ((mins - rangeStart) / 60 * ROW) + 'px';
    };
    const onUp = () => {
      el.classList.remove('dragging');
      el.removeEventListener('pointermove', onMove);
      el.removeEventListener('pointerup', onUp);
      try { el.releasePointerCapture(e.pointerId); } catch (_) {}
      if (!moved) {
        if (isTask) { const t = phase.tasks.find(x => x.id === id); if (t) openEditor('task', t); }
        else { const a = phase.appointments.find(x => x.id === id); if (a) openEditor('appointment', a); }
        return;
      }
      const hm = minToHM(newStart);
      if (isTask) { const t = phase.tasks.find(x => x.id === id); if (t) { t.time = hm; t.userPlaced = true; } }
      else { const a = phase.appointments.find(x => x.id === id); if (a) a.time = hm; }
      save(); renderDay(); toast('Set to ' + hm);
    };
    el.addEventListener('pointermove', onMove);
    el.addEventListener('pointerup', onUp);
    e.preventDefault();
  });
}

document.getElementById('btn-new-phase').onclick = () => showView('setup');
document.getElementById('setup-back').onclick    = () => showView('home');
document.getElementById('phase-back').onclick    = () => showView('home');
document.getElementById('day-back').onclick      = () => showView('phase');
document.getElementById('s-add-goal').onclick    = addGoalRow;
document.getElementById('phase-add').onclick     = () => openTypePicker(null);
document.getElementById('day-add').onclick       = () => openTypePicker(currentDayISO);
document.getElementById('modal-close').innerHTML = svgClose();
document.getElementById('modal-close').onclick   = closeModal;
document.getElementById('modal').onclick = e => { if (e.target.id === 'modal') closeModal(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape' && document.getElementById('modal').style.display === 'flex') closeModal(); });
document.getElementById('s-submit').onclick      = submitPhase;
document.getElementById('s-title').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('s-end').focus(); });

// Day navigation: swipe left/right, or arrow keys, to move between days.
const dayInDay = () => document.getElementById('v-day').style.display !== 'none' && document.getElementById('modal').style.display !== 'flex';
(function () {
  const v = document.getElementById('v-day');
  let sx = 0, sy = 0, tracking = false;
  v.addEventListener('pointerdown', e => { if (e.pointerType === 'mouse' && e.button !== 0) return; sx = e.clientX; sy = e.clientY; tracking = true; });
  v.addEventListener('pointerup', e => {
    if (!tracking) return; tracking = false;
    const dx = e.clientX - sx, dy = e.clientY - sy;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.4) goToDay(dx < 0 ? 1 : -1);
  });
  v.addEventListener('pointercancel', () => { tracking = false; });
})();
document.addEventListener('keydown', e => {
  if (!dayInDay() || e.target.matches('input, textarea, select')) return;
  if (e.key === 'ArrowLeft') goToDay(-1);
  else if (e.key === 'ArrowRight') goToDay(1);
});

// ── INIT ───────────────────────────────────────────────────────────────────

(function init() {
  const h = new Date().getHours();
  document.getElementById('greeting').textContent = h < 12 ? 'Good morning.' : h < 18 ? 'Good afternoon.' : 'Good evening.';
  load(); showView('home');
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js').catch(() => {}));
}
</script>
