<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lock In Planner</title>
<meta name="theme-color" content="#4F46E5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Planner">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234F46E5'/><text x='50' y='70' font-size='58' font-weight='bold' text-anchor='middle' fill='white' font-family='system-ui,sans-serif'>P</text></svg>">
<style>
  :root {
    --paper: #F7F8FA; --surface: #FFFFFF; --surface-2: #F3F5F8;
    --ink: #1E2430; --muted: #6B7280; --faint: #9AA2AE; --line: #E5E8EC;
    --accent: #4F46E5; --accent-hover: #4338CA; --accent-soft: #E6E7FB;
    --c-study: #2563EB; --c-study-bg: #E8EEFD;
    --c-sport: #059669; --c-sport-bg: #E1F3EC;
    --c-house: #D97706; --c-house-bg: #FAEEDC;
    --c-appt:  #4F46E5; --c-appt-bg:  #EAEAFC;
    --c-other: #64748B; --c-other-bg: #EEF1F5;
    --urgent: #DC2626; --urgent-bg: #FCEBEB;
    --soon: #D97706; --soon-bg: #FBEEDC;
    --ok: #059669; --ok-bg: #E1F3EC;
    --radius: 16px; --radius-sm: 10px;
    --shadow: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
    --shadow-md: 0 6px 20px rgba(16,24,40,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); min-height: 100vh; }
  body { font-family: 'Inter', sans-serif; color: var(--ink); line-height: 1.5; -webkit-font-smoothing: antialiased; padding: 28px 40px 60px; }
  .app { max-width: 1120px; margin: 0 auto; }
  @media (max-width: 780px) {
    body { padding: 20px 16px 50px; }
  }

  .kicker { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); font-weight: 600; }
  h1 { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 34px; line-height: 1.08; letter-spacing: -0.025em; margin: 4px 0 6px; }
  .subtitle { color: var(--muted); font-size: 15px; }
  header { margin-bottom: 24px; }

  .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .panel-title { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .panel-title .hint { font-family: 'Inter'; font-size: 12px; color: var(--faint); font-weight: 400; }
  .panel-title .ml { margin-left: auto; }
  details.panel > summary { cursor: pointer; list-style: none; margin-bottom: 0; }
  details.panel > summary::-webkit-details-marker { display: none; }
  details.panel > summary::after { content: '▸'; color: var(--faint); font-size: 11px; margin-left: 8px; transition: transform .15s; }
  details.panel:not([open]) > summary .ml { margin-left: auto; }
  details.panel[open] > summary { margin-bottom: 14px; }
  details.panel[open] > summary::after { transform: rotate(90deg); display: inline-block; }

  input[type=text], input[type=date], select {
    border: 1px solid var(--line); background: var(--surface-2); color: var(--ink);
    border-radius: var(--radius-sm); padding: 10px 12px; font: inherit; font-size: 14px;
    outline: none; transition: border-color .15s, box-shadow .15s; width: 100%;
  }
  input[type=text]:focus, input[type=date]:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  .btn { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 11px 20px; font: inherit; font-weight: 600; font-size: 15px; cursor: pointer; transition: background .15s, transform .05s, box-shadow .15s; white-space: nowrap; box-shadow: 0 1px 2px rgba(16,24,40,.10); }
  .btn:hover { background: var(--accent-hover); filter: none; }
  .btn:active { transform: scale(0.98); }
  .btn.ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--line); }
  .btn.ghost:hover { background: var(--surface-2); filter: none; border-color: var(--faint); }
  .btn.wide { width: 100%; text-align: center; margin-top: 6px; padding: 14px; font-size: 16px; }
  .btn.sm { padding: 7px 13px; font-size: 13px; }
  .btn.xs { padding: 5px 10px; font-size: 12px; }

  .icon-btn { background: none; border: none; color: var(--faint); cursor: pointer; padding: 6px; border-radius: 7px; line-height: 0; transition: color .15s, background .15s; }
  .icon-btn:hover { color: var(--accent); background: var(--accent-soft); }
  .icon-btn svg { width: 16px; height: 16px; }

  .back-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
  .back-bar .page-title { font-family: 'Inter', system-ui, sans-serif; font-size: 19px; font-weight: 600; letter-spacing: -0.015em; }

  /* ── HOME ── */
  .phase-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; cursor: pointer; box-shadow: var(--shadow); transition: border-color .15s, box-shadow .2s, transform .1s; }
  .phase-card:hover { border-color: #CBD2DA; box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .pc-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .pc-title { font-family: 'Inter', system-ui, sans-serif; font-size: 19px; font-weight: 600; letter-spacing: -0.015em; }
  .pc-dates { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .pc-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .pc-badge { font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 100px; white-space: nowrap; }
  .pc-goals { display: flex; flex-wrap: wrap; gap: 6px; }
  .goal-chip { font-size: 12px; padding: 4px 10px; border-radius: 100px; border: 1px solid var(--line); background: var(--surface-2); color: var(--muted); }
  .goal-chip.urgent { background: var(--urgent-bg); color: var(--urgent); border-color: transparent; }
  .goal-chip.soon   { background: var(--soon-bg);   color: var(--soon);   border-color: transparent; }
  .goal-chip.ok     { background: var(--ok-bg);     color: var(--ok);     border-color: transparent; }
  .goal-chip.past   { opacity: 0.5; }

  /* ── SETUP ── */
  .date-range-row { display: flex; gap: 12px; align-items: flex-end; }
  .date-field { flex: 1; }
  .date-field label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .date-sep { color: var(--faint); font-size: 20px; padding-bottom: 10px; }
  .goal-row { display: flex; gap: 8px; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--line); }
  .goal-row:last-of-type { border-bottom: none; }
  .goal-row .gr-title { flex: 1; }
  .goal-row .gr-date  { width: 150px; flex-shrink: 0; }
  .goal-row .gr-cat   { width: 120px; flex-shrink: 0; }

  .routine-row { display: flex; gap: 8px; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .routine-row:last-of-type { border-bottom: none; }
  .routine-row .rr-title { flex: 1; min-width: 140px; }
  .routine-row .rr-cat   { width: 120px; flex-shrink: 0; }
  .freq-ctrl { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .freq-ctrl select { width: auto; padding: 8px 8px; }
  .freq-ctrl .freq-sep, .freq-ctrl .freq-unit { font-size: 13px; color: var(--muted); white-space: nowrap; }

  /* ── PHASE HERO ── */
  .phase-hero { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 22px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .phase-hero h2 { font-family: 'Inter', system-ui, sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
  .ph-dates { font-size: 14px; color: var(--muted); margin-bottom: 14px; }
  .progress-track { height: 6px; background: var(--line); border-radius: 100px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; border-radius: 100px; transition: width .4s; }
  .progress-label { font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; }

  .stats-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .stat { flex: 1; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); }
  .stat .num { font-family: 'Inter', system-ui, sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.01em; line-height: 1; }
  .stat .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ── CALENDAR ── */
  .cal-month { margin-bottom: 22px; }
  .cal-month:last-child { margin-bottom: 0; }
  .cal-month-label { font-family: 'Inter', system-ui, sans-serif; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 8px; }
  .cal-week-row, .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-week-row { margin-bottom: 3px; }
  .cal-week-row span { text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--faint); padding: 2px 0; }
  .cal-cell {
    aspect-ratio: 1; border-radius: 8px; cursor: pointer; position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    background: var(--surface); border: 1px solid var(--line);
    transition: filter .12s; overflow: hidden;
    user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .cal-cell:hover:not(.out-phase):not(.empty) { filter: brightness(0.94); }
  .cal-cell.empty     { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
  .cal-cell.out-phase { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
  .cal-cell.out-phase .cal-num { color: var(--faint); }
  .cal-cell.is-weekend:not(.out-phase) { background: var(--surface-2); }
  .cal-cell.is-past:not(.is-exam) { opacity: 0.55; }
  .cal-num { font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1; z-index: 1; }
  /* today ring */
  .cal-cell.is-today:not(.is-exam) .cal-num {
    background: var(--accent); color: #fff; border-radius: 50%;
    width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  /* exam day: full colored background */
  .cal-cell.is-exam .cal-num { color: #fff; font-weight: 700; z-index: 1; }
  .cal-exam-lbl { font-size: 8px; font-weight: 700; color: rgba(255,255,255,0.9); z-index: 1; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; padding: 0 3px; }
  /* study day: thin colored strip at bottom */
  .cal-strip { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; }
  /* task dot */
  .cal-task-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); opacity: 0.5; z-index: 1; }
  /* routine + task dots row */
  .cal-dots { display: flex; gap: 3px; z-index: 1; margin-top: 1px; }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
  .cal-dot.appt { border-radius: 1px; }   /* appointments = little squares */

  /* ── GOAL LEGEND ── */
  .goal-legend { display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line); }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-hint { font-size: 11px; color: var(--faint); width: 100%; }

  /* ── GOAL PROGRESS BLOCKS ── */
  .goal-block { padding: 16px 0; }
  .goal-block + .goal-block { border-top: 1px solid var(--line); }
  .gb-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .gb-left { flex: 1; min-width: 0; }
  .gb-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .goal-color-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .gb-title { font-size: 15px; font-weight: 600; }
  .gb-sub { font-size: 13px; color: var(--muted); }
  .gb-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .gb-count { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .gb-progress { margin-bottom: 10px; }

  /* tap-to-edit affordance */
  .editable { cursor: pointer; }
  .gb-header.editable { border-radius: var(--radius-sm); margin: -6px -6px 2px; padding: 6px; transition: background .12s; }
  .gb-header.editable:hover { background: var(--surface-2); }
  .gb-header.editable:hover .gb-title { color: var(--accent); }
  .task-body.editable:hover .task-title { color: var(--accent); }
  .edit-hint { pointer-events: none; opacity: 0; transition: opacity .12s; }
  .gb-header.editable:hover .edit-hint { opacity: 0.7; }

  .countdown-badge { flex-shrink: 0; font-size: 12px; font-weight: 700; padding: 5px 11px; border-radius: 100px; }
  .countdown-badge.urgent { background: var(--urgent-bg); color: var(--urgent); }
  .countdown-badge.soon   { background: var(--soon-bg);   color: var(--soon); }
  .countdown-badge.ok     { background: var(--ok-bg);     color: var(--ok); }
  .countdown-badge.past   { background: var(--surface-2); color: var(--faint); }

  /* ── TASK ITEMS ── */
  .task-list { margin: 6px 0; }
  .task-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--line); }
  .task-item:last-child { border-bottom: none; }
  .task-check {
    width: 19px; height: 19px; border-radius: 6px; border: 1.8px solid var(--faint);
    background: transparent; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; padding: 0; line-height: 0;
  }
  .task-check:hover { border-color: var(--ok); background: var(--ok-bg); }
  .task-check.is-done { background: var(--ok); border-color: var(--ok); }
  .task-check svg { width: 10px; height: 10px; color: #fff; opacity: 0; transition: opacity .1s; }
  .task-check.is-done svg { opacity: 1; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 14px; font-weight: 500; }
  .task-title.is-done { text-decoration: line-through; color: var(--faint); }
  .task-sched { font-size: 12px; color: var(--faint); margin-top: 1px; }
  .cat-tag { font-size: 12px; font-weight: 600; padding: 2px 9px; border-radius: 100px; display: inline-block; }

  .add-task-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
  .add-task-row input[type=text] { flex: 1; min-width: 120px; font-size: 13px; padding: 8px 10px; }
  .add-task-row select { flex-shrink: 0; font-size: 13px; padding: 8px 10px; width: auto; }

  .add-goal-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
  .add-goal-row input[type=text] { flex: 1; min-width: 130px; }
  .add-goal-row input[type=date] { width: 150px; flex-shrink: 0; }
  .add-goal-row select { width: 120px; flex-shrink: 0; }

  /* ── DAY VIEW ── */
  .day-hero { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; }
  .day-name { font-family: 'Inter', system-ui, sans-serif; font-size: 30px; font-weight: 500; margin-bottom: 2px; }
  .day-date-full { font-size: 14px; color: var(--muted); margin-bottom: 12px; }
  .day-badge { display: inline-block; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 100px; }
  .day-goal-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; padding: 6px 12px; border-radius: 100px; margin-top: 10px; }
  .day-goal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── MISC ── */
  .empty-state { text-align: center; padding: 52px 20px; color: var(--muted); }
  .empty-state .big { font-family: 'Inter', system-ui, sans-serif; font-size: 22px; color: var(--ink); margin-bottom: 8px; }
  .empty-state .sub { margin-bottom: 24px; font-size: 15px; }
  .no-items { font-size: 13px; color: var(--faint); padding: 4px 0; }

  /* ── PHASE 2-COLUMN LAYOUT ── */
  .phase-grid { display: grid; grid-template-columns: 3fr 2fr; gap: 14px; align-items: start; }
  @media (max-width: 780px) { .phase-grid { grid-template-columns: 1fr; } }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(42,38,32,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
  @media (min-width: 600px) { .modal-overlay { align-items: center; padding: 20px; } }
  .modal { background: var(--surface); border-radius: 18px 18px 0 0; width: 100%; max-width: 460px; max-height: 92vh; overflow-y: auto; box-shadow: 0 -8px 40px rgba(0,0,0,0.18); animation: modalIn .2s ease; }
  @media (min-width: 600px) { .modal { border-radius: 18px; } }
  @keyframes modalIn { from { transform: translateY(24px); opacity: .5; } to { transform: none; opacity: 1; } }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 15px 18px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .modal-title { font-family: 'Inter', system-ui, sans-serif; font-size: 19px; font-weight: 500; text-transform: capitalize; }
  .modal-body { padding: 16px 18px 22px; }

  .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .type-card { border: 1px solid var(--line); background: var(--surface-2); border-radius: var(--radius); padding: 15px; cursor: pointer; text-align: left; font: inherit; transition: border-color .15s, box-shadow .15s; }
  .type-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .type-card .tc-name { font-weight: 600; font-size: 15px; margin-bottom: 3px; display: flex; align-items: center; gap: 7px; color: var(--ink); }
  .type-card .tc-desc { font-size: 12px; color: var(--muted); }
  .type-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .field { margin-bottom: 14px; }
  .field:last-of-type { margin-bottom: 0; }
  .field > label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field input[type=time] { border: 1px solid var(--line); background: var(--surface-2); color: var(--ink); border-radius: var(--radius-sm); padding: 10px 12px; font: inherit; font-size: 14px; width: 100%; outline: none; }
  .field-row { display: flex; gap: 10px; }
  .field-row > .field { flex: 1; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .modal-actions .btn.ml-grow { flex: 1; }
  .modal-actions .btn.danger { background: var(--surface); color: var(--urgent); border: 1px solid var(--line); }
  .modal-actions .btn.danger:hover { background: var(--urgent-bg); border-color: transparent; filter: none; }
  .modal-actions .btn.danger svg { width: 16px; height: 16px; vertical-align: -3px; }

  .toast { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 100px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Daily capacity */
  .cap-grid { display: flex; gap: 8px; }
  .cap-cell { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .cap-dow { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); }
  .cap-input { width: 100%; text-align: center; border: 1px solid var(--line); background: var(--surface-2); color: var(--ink);
    border-radius: var(--radius-sm); padding: 9px 4px; font: inherit; font-size: 15px; font-weight: 600; outline: none; transition: border-color .15s, box-shadow .15s; -moz-appearance: textfield; }
  .cap-input::-webkit-inner-spin-button, .cap-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .cap-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  /* Effort slider */
  .effort-ctrl { display: flex; align-items: center; gap: 14px; }
  .effort-readout { min-width: 64px; text-align: right; font-weight: 600; font-size: 14px; color: var(--accent); white-space: nowrap; }
  input[type=range] { -webkit-appearance: none; appearance: none; flex: 1; height: 6px; border-radius: 100px; background: var(--line); outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 3px solid var(--surface); box-shadow: 0 0 0 1px var(--line); transition: transform .05s; }
  input[type=range]::-webkit-slider-thumb:active { transform: scale(1.12); }
  input[type=range]::-moz-range-thumb { width: 17px; height: 17px; border-radius: 50%; background: var(--accent); cursor: pointer; border: 3px solid var(--surface); box-shadow: 0 0 0 1px var(--line); }
  input[type=range]:focus { box-shadow: 0 0 0 3px var(--accent-soft); }

  /* Day load meter */
  .load-meter { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
  .load-bar { flex: 1; height: 8px; border-radius: 100px; background: var(--line); overflow: hidden; }
  .load-fill { height: 100%; border-radius: 100px; transition: width .25s; }
  .load-label { font-size: 13px; font-weight: 600; white-space: nowrap; }
  .load-meter.ok   .load-fill { background: var(--ok); }
  .load-meter.ok   .load-label { color: var(--ok); }
  .load-meter.full .load-fill { background: var(--accent); }
  .load-meter.full .load-label { color: var(--accent); }
  .load-meter.over .load-fill { background: var(--soon); }
  .load-meter.over .load-label { color: var(--soon); }

  /* Over-capacity day marker on the calendar */
  .cal-cell.is-over::after { content: ''; position: absolute; top: 4px; right: 4px; width: 5px; height: 5px; border-radius: 50%; background: var(--soon); }

  /* Coach panel */
  .panel.coach { border-color: var(--accent-soft); }
  .coach-intro { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .coach-key-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .coach-key-row input { flex: 1; }
  .coach-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .coach-chip { font-size: 12px; font-weight: 600; color: var(--accent); background: var(--accent-soft); border: 1px solid transparent; border-radius: 100px; padding: 5px 11px; cursor: pointer; transition: filter .15s; }
  .coach-chip:hover { filter: brightness(.97); }
  .coach-input { width: 100%; border: 1px solid var(--line); background: var(--surface-2); color: var(--ink); border-radius: var(--radius-sm); padding: 10px 12px; font: inherit; font-size: 14px; resize: vertical; outline: none; transition: border-color .15s, box-shadow .15s; }
  .coach-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .coach-actions { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .coach-settings { display: none; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
  .coach-settings.open { display: flex; }
  .coach-model-wrap { flex: 1; min-width: 0; }
  .coach-model { width: 100%; max-width: 180px; padding: 7px 8px; font-size: 12px; }
  .coach-out { margin-top: 12px; padding: 12px 14px; background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--radius-sm); font-size: 14px; line-height: 1.55; }
  .coach-out.loading { color: var(--muted); }
  .coach-out.error { background: var(--urgent-bg); border-color: transparent; color: var(--urgent); }
  .coach-out p { margin: 0 0 8px; } .coach-out p:last-child { margin-bottom: 0; }
  .coach-out ul { margin: 0 0 8px 18px; } .coach-out li { margin: 2px 0; }
  .coach-out h4 { font-size: 14px; font-weight: 600; margin: 10px 0 4px; }
  .coach-out code { background: var(--surface); border: 1px solid var(--line); border-radius: 4px; padding: 0 4px; font-size: 12px; }

  /* ── Gentle nudges ── */
  .nudges { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .nudge { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--accent-soft); border-radius: var(--radius); cursor: pointer; transition: filter .15s, transform .1s; }
  .nudge:hover { filter: brightness(.98); transform: translateY(-1px); }
  .nudge-icon { font-size: 17px; line-height: 1; }
  .nudge-text { flex: 1; font-size: 14px; color: var(--ink); }
  .nudge-text strong { font-weight: 600; }
  .nudge-x { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 6px; line-height: 0; transition: background .15s, color .15s; }
  .nudge-x:hover { background: rgba(16,24,40,.06); color: var(--ink); }
  .nudge-x svg { width: 14px; height: 14px; }

  /* ── Day timeline (hour-by-hour) ── */
  .timeline { position: relative; max-height: 62vh; overflow-y: auto; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--surface-2); }
  .tl-inner { position: relative; }
  .tl-hour { position: absolute; left: 0; right: 0; height: 0; }
  .tl-hour .tl-hlabel { position: absolute; left: 8px; top: -7px; font-size: 11px; color: var(--faint); background: var(--surface-2); padding: 0 3px; }
  .tl-hour .tl-hline { position: absolute; left: 52px; right: 0; top: 0; border-top: 1px solid var(--line); }
  .tl-blocks { position: absolute; left: 52px; right: 6px; top: 0; bottom: 0; }
  .tl-block { position: absolute; border-radius: 7px; padding: 3px 24px 3px 8px; overflow: hidden; cursor: pointer; background: var(--bg); border-left: 3px solid var(--bc); box-shadow: var(--shadow); transition: filter .12s, transform .08s; }
  .tl-block:hover { filter: brightness(.97); transform: translateY(-1px); }
  .tl-block.is-done, .tl-block.is-skip { opacity: .5; }
  .tl-block.type-study { cursor: default; border-left-style: dashed; }
  .tl-block.type-study .tl-b-title { font-weight: 500; }
  .tl-block.dragging { cursor: grabbing; box-shadow: var(--shadow-md); z-index: 5; opacity: .95; user-select: none; }

  /* Day navigation (swipe / arrows) */
  .day-head { display: flex; align-items: center; gap: 10px; }
  .day-head-mid { flex: 1; }
  .day-arrow { flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line); background: var(--surface); color: var(--muted); font-size: 20px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s, color .15s, border-color .15s; }
  .day-arrow:hover:not(:disabled) { background: var(--accent-soft); color: var(--accent); border-color: transparent; }
  .day-arrow:disabled { opacity: .35; cursor: default; }
  #day-content.slide-next { animation: dayInRight .22s cubic-bezier(.2,.7,.2,1); }
  #day-content.slide-prev { animation: dayInLeft .22s cubic-bezier(.2,.7,.2,1); }
  @keyframes dayInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: none; } }
  @keyframes dayInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: none; } }
  .tl-block.is-done .tl-b-title { text-decoration: line-through; }
  .tl-b-time { font-size: 10px; color: var(--muted); line-height: 1.1; }
  .tl-b-title { font-size: 12px; font-weight: 600; line-height: 1.2; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tl-check { position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; border-radius: 5px; border: 1px solid var(--line); background: rgba(255,255,255,.75); color: transparent; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s; }
  .tl-check svg { width: 11px; height: 11px; }
  .tl-check:hover { border-color: var(--ok); }
  .tl-block.is-done .tl-check, .tl-any-row.is-done .tl-check { background: var(--ok); border-color: var(--ok); color: #fff; }
  .tl-anytime { margin-bottom: 12px; padding: 10px 12px; background: var(--surface-2); border: 1px dashed var(--line); border-radius: var(--radius-sm); }
  .tl-anytime-h { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .tl-any-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; cursor: pointer; }
  .tl-any-row .tl-check { position: static; }
  .tl-any-title { flex: 1; font-size: 14px; font-weight: 500; }
  .tl-any-row.is-done .tl-any-title { text-decoration: line-through; color: var(--muted); }
  .tl-any-dur { font-size: 12px; color: var(--faint); }

  /* ── Motion & polish ── */
  @keyframes viewIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  #v-home, #v-setup, #v-phase, #v-day { animation: viewIn .28s cubic-bezier(.2,.7,.2,1) both; }

  /* Modal open */
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes dialogIn { from { opacity: 0; transform: translateY(10px) scale(.98); } to { opacity: 1; transform: none; } }
  .modal-overlay { animation: overlayIn .18s ease both; }
  .modal-overlay .modal { animation: dialogIn .24s cubic-bezier(.2,.8,.2,1) both; }

  /* Calendar day hover lift */
  .cal-cell { transition: filter .12s, transform .12s, box-shadow .15s; }
  .cal-cell:hover:not(.out-phase):not(.empty) { transform: translateY(-1px); box-shadow: var(--shadow); }

  /* Checkbox press feedback */
  .task-check { transition: transform .12s, background .15s, border-color .15s, color .15s; }
  .task-check:active { transform: scale(.86); }

  /* Buttons & chips: a touch of lift */
  .btn:not(.ghost):hover { transform: translateY(-1px); }
  .coach-chip:active { transform: scale(.96); }

  /* Coach "Thinking…" animated dots */
  .coach-typing { display: inline-flex; gap: 4px; vertical-align: middle; margin-left: 4px; }
  .coach-typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: coachBlink 1.2s infinite ease-in-out both; }
  .coach-typing span:nth-child(2) { animation-delay: .18s; }
  .coach-typing span:nth-child(3) { animation-delay: .36s; }
  @keyframes coachBlink { 0%, 80%, 100% { opacity: .25; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-3px); } }

  /* Respect users who prefer less motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; scroll-behavior: auto !important; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ── HOME ── -->
  <div id="v-home">
    <header>
      <div class="kicker">Lock In Planner</div>
      <h1 id="greeting">Lock in.</h1>
      <p class="subtitle">Create a focused planning phase. Set your goals, know your deadlines.</p>
    </header>
    <div id="phase-list"></div>
    <button class="btn wide" id="btn-new-phase">+ Start a new Lock In</button>
  </div>

  <!-- ── SETUP ── -->
  <div id="v-setup" style="display:none">
    <div class="back-bar">
      <button class="icon-btn" id="setup-back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 5 5 12 12 19"/></svg>
      </button>
      <span class="page-title">New Lock In</span>
    </div>
    <div class="panel">
      <div class="panel-title">Name this phase</div>
      <input type="text" id="s-title" placeholder="e.g. Exam week, Sprint, Study block…" />
    </div>
    <div class="panel">
      <div class="panel-title">Time period</div>
      <div class="date-range-row">
        <div class="date-field"><label>Start</label><input type="date" id="s-start" /></div>
        <div class="date-sep">→</div>
        <div class="date-field"><label>End</label><input type="date" id="s-end" /></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Main goals <span class="hint">— add exams, deadlines, or targets</span></div>
      <div id="s-goals-list"></div>
      <button class="btn ghost" style="margin-top:10px" id="s-add-goal">+ Add a goal</button>
    </div>
    <p class="subtitle" style="margin:2px 4px 14px">You'll add routines, appointments and tasks inside the phase once it's created.</p>
    <button class="btn wide" id="s-submit">Lock in →</button>
  </div>

  <!-- ── PHASE ── -->
  <div id="v-phase" style="display:none">
    <div class="back-bar">
      <button class="icon-btn" id="phase-back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 5 5 12 12 19"/></svg>
      </button>
      <span class="page-title" id="ph-title-bar"></span>
      <button class="btn sm" id="phase-add" style="margin-left:auto">+ Add</button>
    </div>
    <div id="phase-content"></div>
  </div>

  <!-- ── DAY ── -->
  <div id="v-day" style="display:none">
    <div class="back-bar">
      <button class="icon-btn" id="day-back" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 5 5 12 12 19"/></svg>
      </button>
      <span class="page-title" id="day-title-bar"></span>
      <button class="btn sm" id="day-add" style="margin-left:auto">+ Add</button>
    </div>
    <div id="day-content"></div>
  </div>

</div>

<!-- ── ADD / EDIT MODAL ── -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <span class="modal-title" id="modal-title">Add</span>
      <button class="icon-btn" id="modal-close" aria-label="Close"></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const APP_VERSION = '0.31';
const PKEY = 'daily-planner:phases:v1';

const CATS = {
  study: { label: 'Study',       color: 'var(--c-study)', bg: 'var(--c-study-bg)' },
  sport: { label: 'Sport',       color: 'var(--c-sport)', bg: 'var(--c-sport-bg)' },
  house: { label: 'House',       color: 'var(--c-house)', bg: 'var(--c-house-bg)' },
  appt:  { label: 'Appointment', color: 'var(--c-appt)',  bg: 'var(--c-appt-bg)'  },
  other: { label: 'Other',       color: 'var(--c-other)', bg: 'var(--c-other-bg)' },
};

// Effort = estimated minutes a task/routine session takes (stored as a number).
// Legacy string tiers from an earlier version still map cleanly to minutes.
const APPT_MINUTES = 45;            // an appointment's assumed slice of the day
const EFFORT_MIN = 5, EFFORT_MAX = 240, EFFORT_STEP = 5, EFFORT_DEFAULT = 45;
function effortMinutes(e) {
  if (typeof e === 'number' && e > 0) return e;
  if (e === 'quick') return 15;
  if (e === 'deep')  return 120;
  return EFFORT_DEFAULT;            // 'normal' or unset
}
function fmtDur(min) {
  min = Math.round(min);
  if (min <= 0) return '0 min';
  if (min < 60) return `${min} min`;
  const h = Math.floor(min / 60), m = min % 60;
  return m ? `${h}h ${m}m` : `${h}h`;
}

// Sequential palette — one color per goal, by index
const GOAL_PALETTE = [
  { color: '#3E6DB5', bg: '#E7EEF8' },
  { color: '#4F8A3D', bg: '#E8F1E2' },
  { color: '#C08A2B', bg: '#F6ECD6' },
  { color: '#9B3A7A', bg: '#F5E4F0' },
  { color: '#2A9090', bg: '#E0F3F3' },
  { color: '#7B5EA7', bg: '#EDE8F5' },
];

let phases         = [];
let currentPhaseId = null;
let currentDayISO  = null;

// ── UTILS ──────────────────────────────────────────────────────────────────

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isoFromDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function daysUntil(iso) {
  return Math.round((new Date(iso+'T00:00:00') - new Date(todayISO()+'T00:00:00')) / 86400000);
}
function urgencyClass(days) {
  if (days < 0)  return 'past';
  if (days <= 3) return 'urgent';
  if (days <= 7) return 'soon';
  return 'ok';
}
function urgencyLabel(days) {
  if (days < 0)   return 'Past';
  if (days === 0) return 'Today!';
  if (days === 1) return 'Tomorrow';
  return `${days} days`;
}
function fmtShort(iso) {
  return new Date(iso+'T00:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}
function fmtMed(iso) {
  return new Date(iso+'T00:00:00').toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
}
function fmtLong(iso) {
  return new Date(iso+'T00:00:00').toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'long' });
}
function fmtDayFull(iso) {
  return new Date(iso+'T00:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
}
function fmtWeekday(iso) {
  return new Date(iso+'T00:00:00').toLocaleDateString('en-GB', { weekday:'long' });
}

// ── PERSISTENCE ────────────────────────────────────────────────────────────

function load() {
  try { const r = localStorage.getItem(PKEY); phases = r ? JSON.parse(r) : []; }
  catch(e) { phases = []; }
  phases.forEach(p => {
    if (!p.tasks) p.tasks = [];
    if (!p.goals) p.goals = [];
    if (!p.routines) p.routines = [];
    if (!p.routineLog) p.routineLog = {};
    if (!p.appointments) p.appointments = [];
    if (!p.capacityMin) {
      // Migrate the older per-weekday item-counts (~45 min each) to minutes.
      if (p.capacity && typeof p.capacity === 'object') {
        p.capacityMin = {};
        for (let d = 0; d < 7; d++) {
          const c = p.capacity[d];
          p.capacityMin[d] = (typeof c === 'number' ? c : (d === 0 || d === 6 ? 2 : 4)) * 45;
        }
      } else {
        p.capacityMin = defaultCapacity();
      }
      delete p.capacity;
    }
  });
}
function save() { try { localStorage.setItem(PKEY, JSON.stringify(phases)); } catch(e) {} }

// ── DAILY CAPACITY ─────────────────────────────────────────────────────────
// How many "things" (tasks + appointments + routine sessions) feel doable on a
// given weekday. Keyed by JS Date.getDay(): 0=Sun .. 6=Sat. Until tasks carry an
// effort/time estimate, load is counted as items; capacity is the ceiling.
function defaultCapacity() {        // minutes per weekday, keyed by getDay() (Sun..Sat)
  return { 0: 90, 1: 180, 2: 180, 3: 180, 4: 180, 5: 180, 6: 90 };
}
function dayCapacity(phase, iso) {  // minutes
  const cap = phase.capacityMin || defaultCapacity();
  const v = cap[new Date(iso + 'T00:00:00').getDay()];
  return (typeof v === 'number' && v >= 0) ? v : 180;
}
// Load (in minutes) of not-yet-done work planned on a day, summed by effort.
// (Skipped routine sessions don't count; appointments take a fixed slice.)
function dayLoad(phase, iso, routinePlan) {
  let w = 0;
  (phase.tasks || []).forEach(t => { if (t.date === iso && !t.done) w += effortMinutes(t.effort); });
  (phase.appointments || []).forEach(a => { if (a.date === iso && !a.done) w += APPT_MINUTES; });
  const log = phase.routineLog || {};
  ((routinePlan && routinePlan[iso]) || []).forEach(rid => {
    if (log[`${rid}|${iso}`] === 'skip') return;
    const r = (phase.routines || []).find(x => x.id === rid);
    w += effortMinutes(r && r.effort);
  });
  return w;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── ICONS ──────────────────────────────────────────────────────────────────

function svgTrash() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;
}
function svgCheck() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
}
function svgPencil() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>`;
}
function svgClose() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
}

// ── VIEWS ──────────────────────────────────────────────────────────────────

function showView(name) {
  ['home','setup','phase','day'].forEach(n => {
    document.getElementById(`v-${n}`).style.display = n === name ? '' : 'none';
  });
  window.scrollTo(0, 0);
  if (name === 'home')  renderHome();
  if (name === 'setup') initSetup();
  if (name === 'phase') renderPhase();
  if (name === 'day')   renderDay();
}

// ── HOME ───────────────────────────────────────────────────────────────────

// ── GENTLE NUDGES (calm, dismissable check-ins on the home screen) ──────────
const NUDGE_LS = 'lockin:dismissed-nudges';
function getDismissed() { try { return JSON.parse(localStorage.getItem(NUDGE_LS) || '[]'); } catch (e) { return []; } }
function dismissNudge(id) { try { const a = getDismissed(); if (!a.includes(id)) { a.push(id); localStorage.setItem(NUDGE_LS, JSON.stringify(a.slice(-60))); } } catch (e) {} }
function activePhase() { const t = todayISO(); return phases.find(p => t >= p.start && t <= p.end) || null; }

function computeNudges(phase) {
  const today = todayISO();
  const out = [];
  const wkIdx = (new Date(today + 'T00:00:00').getDay() + 6) % 7;   // 0 = Monday

  // Routines behind their weekly target — only from mid-week, and gently.
  (phase.routines || []).forEach(r => {
    const target = Math.max(1, r.perWeekMin || 1);
    const done = routineWeekProgress(phase, r, today);
    const needed = target - done;
    if (needed > 0 && wkIdx >= 2) {
      out.push({
        id: `routine-${r.id}-${mondayOf(today)}`,
        icon: r.cat === 'sport' ? '💪' : r.cat === 'house' ? '🧺' : '🔁',
        text: `You've done <strong>${escapeHtml(r.title)}</strong> ${done}/${target} this week — ${needed === 1 ? 'one more to go' : needed + ' more to go'}.`,
      });
    }
  });
  return out;
}

function buildNudges() {
  const phase = activePhase();
  if (!phase) return '';
  const dismissed = getDismissed();
  const nudges = computeNudges(phase).filter(n => !dismissed.includes(n.id));
  if (!nudges.length) return '';
  return `<div class="nudges">${nudges.map(n => `
    <div class="nudge" data-phase="${phase.id}">
      <span class="nudge-icon">${n.icon}</span>
      <span class="nudge-text">${n.text}</span>
      <button class="nudge-x" data-dismiss="${escapeHtml(n.id)}" aria-label="Dismiss">${svgClose()}</button>
    </div>`).join('')}</div>`;
}

function renderHome() {
  const el = document.getElementById('phase-list');
  if (phases.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="big">Nothing locked in yet</div>
      <div class="sub">Create your first planning phase — give it a name, set the dates, and add your goals.</div>
    </div>`;
    return;
  }
  el.innerHTML = buildNudges() + phases.map(p => {
    const daysLeft = daysUntil(p.end);
    const badgeStyle =
      daysLeft < 0  ? 'background:var(--surface-2);color:var(--faint)' :
      daysLeft <= 3 ? 'background:var(--urgent-bg);color:var(--urgent)' :
      daysLeft <= 7 ? 'background:var(--soon-bg);color:var(--soon)' :
                      'background:var(--ok-bg);color:var(--ok)';
    const badgeText = daysLeft < 0 ? 'Ended' : daysLeft === 0 ? 'Last day!' : `${daysLeft}d left`;
    const chips = (p.goals||[]).slice().sort((a,b) => a.date < b.date ? -1 : 1)
      .map(g => { const d = daysUntil(g.date); return `<span class="goal-chip ${urgencyClass(d)}">${escapeHtml(g.title)} · ${urgencyLabel(d)}</span>`; }).join('');
    return `<div class="phase-card" data-id="${p.id}">
      <div class="pc-header">
        <div><div class="pc-title">${escapeHtml(p.title)}</div><div class="pc-dates">${fmtShort(p.start)} → ${fmtShort(p.end)}</div></div>
        <div class="pc-right">
          <span class="pc-badge" style="${badgeStyle}">${badgeText}</span>
          <button class="icon-btn" data-del="${p.id}" aria-label="Delete">${svgTrash()}</button>
        </div>
      </div>
      ${chips ? `<div class="pc-goals">${chips}</div>` : ''}
    </div>`;
  }).join('');
  el.querySelectorAll('.phase-card').forEach(card => {
    card.onclick = e => {
      if (e.target.closest('[data-del]')) return;
      currentPhaseId = card.dataset.id; showView('phase');
    };
  });
  el.querySelectorAll('[data-del]').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      const p = phases.find(x => x.id === btn.dataset.del);
      if (!p || !confirm(`Delete "${p.title}"? This cannot be undone.`)) return;
      phases = phases.filter(x => x.id !== p.id);
      save(); renderHome(); toast('Phase deleted');
    };
  });
  el.querySelectorAll('[data-dismiss]').forEach(b => {
    b.onclick = e => { e.stopPropagation(); dismissNudge(b.dataset.dismiss); renderHome(); };
  });
  el.querySelectorAll('.nudge').forEach(n => {
    n.onclick = () => { currentPhaseId = n.dataset.phase; showView('phase'); };
  });
}

// ── SETUP ──────────────────────────────────────────────────────────────────

let setupGoals = [];

function catOptions(sel) {

}
function freqOptions(sel) {
  let o = '';
  for (let i = 1; i <= 7; i++) o += `<option value="${i}"${+sel === i ? ' selected' : ''}>${i}</option>`;
  return o;
}

function initSetup() {

  document.getElementById('s-start').value = todayISO();
  document.getElementById('s-end').value   = '';
  setupGoals = [];
  addGoalRow();
}

function renderGoalRows() {

function addGoalRow() {
  setupGoals.push({ title:'', date:'', cat:'study' });
  renderGoalRows();
  setTimeout(() => { const ins = document.querySelectorAll('.gr-title'); if (ins.length) ins[ins.length-1].focus(); }, 40);
}

function submitPhase() {
  const title = document.getElementById('s-title').value.trim();
  const start = document.getElementById('s-start').value;
  const end   = document.getElementById('s-end').value;
  if (!title) { document.getElementById('s-title').focus(); toast('Give this phase a name'); return; }
  if (!end)   { document.getElementById('s-end').focus();   toast('Set an end date');        return; }
  if (end < start) { toast('End date must be after start date'); return; }
  const goals = setupGoals.filter(g => g.title.trim() && g.date)
    .map(g => ({ id: uid(), title: g.title.trim(), date: g.date, cat: g.cat||'study' }));
  phases.push({ id: uid(), title, start, end, goals, tasks: [], routines: [], routineLog: {}, appointments: [], capacityMin: defaultCapacity() });
  save(); currentPhaseId = phases[phases.length-1].id; toast('Locked in!'); showView('phase');
}

// ── DAY PLAN (auto-distributed, no storage needed) ─────────────────────────

function computeDayPlan(phase) {
  // Returns { 'YYYY-MM-DD': goalId | 'exam:goalId' }
  const plan  = {};
  const goals = (phase.goals||[]).slice().sort((a,b) => a.date < b.date ? -1 : 1);
  if (!goals.length) return plan;

  // Mark exam days
  goals.forEach(g => { plan[g.date] = 'exam:' + g.id; });

  // Collect non-exam days in phase
  const studyDays = [];
  const cur = new Date(phase.start + 'T00:00:00');
  const end = new Date(phase.end   + 'T00:00:00');
  while (cur <= end) {
    const iso = isoFromDate(cur);
    if (!plan[iso]) studyDays.push(iso);
    cur.setDate(cur.getDate() + 1);
  }

  // Round-robin, removing goals once their deadline has passed
  let idx = 0;
  const active = [...goals];
  studyDays.forEach(day => {
    while (active.length && day > active[0].date) {
      active.shift();
      if (active.length) idx = idx % active.length;
    }
    if (!active.length) return;
    idx = idx % active.length;
    plan[day] = active[idx].id;
    idx = (idx + 1) % active.length;
  });
  return plan;
}

function buildGoalColorMap(phase) {
  const map = {};
  (phase.goals||[]).slice().sort((a,b) => a.date < b.date ? -1 : 1)
    .forEach((g, i) => { map[g.id] = i; });
  return map;
}

// ── ROUTINE PLAN (weekly-target commitments, auto-distributed) ──────────────

function mondayOf(iso) {
  const d = new Date(iso + 'T00:00:00');
  const dow = (d.getDay() + 6) % 7;          // 0 = Monday
  d.setDate(d.getDate() - dow);
  return isoFromDate(d);
}
function routineKey(rid, date) { return `${rid}|${date}`; }
function weekRangeFrom(mondayISO) {
  const e = new Date(mondayISO + 'T00:00:00');
  e.setDate(e.getDate() + 6);
  return [mondayISO, isoFromDate(e)];
}

// Returns { 'YYYY-MM-DD': [routineId, ...] } — planned routine sessions per day.
function computeRoutinePlan(phase) {
  const routines = phase.routines || [];
  const plan = {};
  if (!routines.length) return plan;

  const log   = phase.routineLog || {};
  const today = todayISO();

  // Exam days stay clear of routines.
  const examDay = {};
  (phase.goals || []).forEach(g => { examDay[g.date] = true; });

  // Daily load (weighted by effort) from appointments + one-off tasks; routine
  // sessions add to it as we place them.
  const load = {};
  (phase.appointments || []).forEach(a => { if (a.date) load[a.date] = (load[a.date] || 0) + APPT_MINUTES; });
  (phase.tasks || []).forEach(t => { if (t.date && !t.done) load[t.date] = (load[t.date] || 0) + effortMinutes(t.effort); });

  const add = (date, rid) => {
    const arr = (plan[date] = plan[date] || []);
    if (!arr.includes(rid)) {
      arr.push(rid);
      const r = routines.find(x => x.id === rid);
      load[date] = (load[date] || 0) + effortMinutes(r && r.effort);
    }
  };

  // 1) Pin every logged session (done or skipped) to its date so it always renders there.
  for (const key in log) {
    const sep  = key.lastIndexOf('|');
    const rid  = key.slice(0, sep);
    const date = key.slice(sep + 1);
    if (routines.some(r => r.id === rid)) add(date, rid);
  }

  // 2) Walk each week (Mon-anchored) overlapping the phase.
  const weeks = [];
  let m = mondayOf(phase.start);
  const lastM = mondayOf(phase.end);
  while (m <= lastM) {
    weeks.push(m);
    const d = new Date(m + 'T00:00:00'); d.setDate(d.getDate() + 7); m = isoFromDate(d);
  }

  // 3) Top each routine up to its weekly target on the lightest eligible days.
  routines.forEach(r => {
    const target = Math.max(1, r.perWeekMax || r.perWeekMin || 1);
    weeks.forEach(wk => {
      const [wkStart, wkEnd] = weekRangeFrom(wk);

      const days = [];
      const d = new Date(wk + 'T00:00:00');
      for (let i = 0; i < 7; i++) {
        const iso = isoFromDate(d); d.setDate(d.getDate() + 1);
        if (iso < phase.start || iso > phase.end) continue;
        if (iso < today) continue;          // never plan in the past
        if (examDay[iso]) continue;         // keep exam days clear
        days.push(iso);
      }

      // Count what's already placed/logged for this routine this week.
      let have = 0;
      for (const date in plan) {
        if (date >= wkStart && date <= wkEnd && plan[date].includes(r.id)) have++;
      }
      const need = target - have;
      if (need <= 0) return;

      const candidates = days.filter(iso => !(plan[iso] || []).includes(r.id));
      // Spread routine sessions onto the lightest days first.
      candidates.sort((a, b) => (load[a] || 0) - (load[b] || 0) || (a < b ? -1 : 1));
      for (let i = 0; i < need && i < candidates.length; i++) add(candidates[i], r.id);
    });
  });

  return plan;
}

// How many sessions of a routine are marked done in the week containing `refISO`.
function routineWeekProgress(phase, routine, refISO) {
  const [wkStart, wkEnd] = weekRangeFrom(mondayOf(refISO));
  let done = 0;
  const log = phase.routineLog || {};
  for (const key in log) {
    if (log[key] !== 'done') continue;
    const sep = key.lastIndexOf('|');
    if (key.slice(0, sep) !== routine.id) continue;
    const date = key.slice(sep + 1);
    if (date >= wkStart && date <= wkEnd) done++;
  }
  return done;
}

// ── USER-TASK SCHEDULER ────────────────────────────────────────────────────

function rebuildAuto(phase) {
  const today   = todayISO();
  const dayPlan = computeDayPlan(phase);
  const goalDates = {};
  (phase.goals||[]).forEach(g => { goalDates[g.id] = g.date; });

  // Release future planner-assigned dates
  phase.tasks.forEach(t => {
    if (!t.userPlaced && !t.done && t.date && t.date >= today) t.date = null;
  });

  const toPlace = phase.tasks.filter(t => t.date === null && !t.done);
  if (!toPlace.length) return;

  toPlace.sort((a, b) => {
    const da = a.goalId ? (goalDates[a.goalId]||phase.end) : phase.end;
    const db = b.goalId ? (goalDates[b.goalId]||phase.end) : phase.end;
    return da < db ? -1 : 1;
  });

  const load = {};
  (phase.appointments||[]).forEach(a => { if (a.date) load[a.date] = (load[a.date]||0) + APPT_MINUTES; });
  phase.tasks.forEach(t => { if (t.date && !t.done) load[t.date] = (load[t.date]||0) + effortMinutes(t.effort); });

  toPlace.forEach(task => {
    const deadline = task.goalId ? (goalDates[task.goalId]||phase.end) : phase.end;
    const rs = today > phase.start ? today : phase.start;
    const days = [];
    const c = new Date(rs + 'T00:00:00'), s = new Date(deadline + 'T00:00:00');
    while (c < s) { days.push(isoFromDate(c)); c.setDate(c.getDate()+1); }
    if (!days.length) { task.date = deadline; load[deadline] = (load[deadline]||0)+effortMinutes(task.effort); return; }
    // Prefer days already assigned to this goal in the day plan
    const preferred = days.filter(d => dayPlan[d] === task.goalId);
    const pool = preferred.length ? preferred : days;
    // Pick the lightest day.
    let best = pool[0], bLoad = Infinity;
    for (const d of pool) { const l = load[d]||0; if (l < bLoad) { bLoad = l; best = d; } }
    task.date = best; load[best] = (load[best]||0)+effortMinutes(task.effort);
  });
}

// ── CALENDAR ───────────────────────────────────────────────────────────────

function buildCalendar(phase, dayPlan, colorMap, routinePlan) {
  routinePlan = routinePlan || {};
  const rLog = phase.routineLog || {};
  const today = todayISO();
  const taskMap = {};
  (phase.tasks||[]).forEach(t => { if (t.date) (taskMap[t.date] = taskMap[t.date]||[]).push(t); });
  const apptMap = {};
  (phase.appointments||[]).forEach(a => { if (a.date) (apptMap[a.date] = apptMap[a.date]||[]).push(a); });

  const months = [];
  let cur = new Date(new Date(phase.start+'T00:00:00').getFullYear(), new Date(phase.start+'T00:00:00').getMonth(), 1);
  const endM = new Date(new Date(phase.end+'T00:00:00').getFullYear(), new Date(phase.end+'T00:00:00').getMonth(), 1);
  while (cur <= endM) { months.push(new Date(cur)); cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1); }

  return months.map(mDate => {
    const yr = mDate.getFullYear(), mo = mDate.getMonth();
    const dim = new Date(yr, mo+1, 0).getDate();
    const label = mDate.toLocaleDateString('en-GB', { month:'long', year:'numeric' });
    const firstDow = (new Date(yr, mo, 1).getDay() + 6) % 7;

    let cells = '';
    for (let i = 0; i < firstDow; i++) cells += '<div class="cal-cell empty"></div>';

    for (let day = 1; day <= dim; day++) {
      const iso  = `${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dow  = new Date(iso+'T00:00:00').getDay();
      const inP  = iso >= phase.start && iso <= phase.end;
      const isT  = iso === today;
      const isP  = iso < today;
      const isWE = dow === 0 || dow === 6;

      const cls = ['cal-cell'];
      if (!inP) { cls.push('out-phase'); }
      else {
        if (isP)  cls.push('is-past');
        if (isWE) cls.push('is-weekend');
      }

      let inner = `<span class="cal-num">${day}</span>`;
      let extraStyle = '';

      const entry = inP ? dayPlan[iso] : null;
      if (entry) {
        const isExam = entry.startsWith('exam:');
        const gid    = isExam ? entry.slice(5) : entry;
        const ci     = colorMap[gid] ?? 0;
        const col    = GOAL_PALETTE[ci % GOAL_PALETTE.length];

        if (isExam) {
          cls.push('is-exam');
          const examRed = '#C0392B';
          extraStyle = `background:${examRed};border-color:${examRed}`;
          const examGoal = (phase.goals||[]).find(g => g.id === gid);
          const examName = examGoal ? examGoal.title : 'Exam';
          inner = `<span class="cal-num">${day}</span><span class="cal-exam-lbl">${escapeHtml(examName)}</span>`;
        } else {
          // Study day: colored bottom strip; today gets accent ring on the number (already via CSS)
          if (isT) cls.push('is-today');
          inner += `<span class="cal-strip" style="background:${col.color}"></span>`;
        }
      } else if (isT) {
        cls.push('is-today');
      }

      // Routine + task dots
      const isExamCell = entry && entry.startsWith('exam:');
      if (!isExamCell) {
        const dots = [];
        (routinePlan[iso] || []).forEach(rid => {
          const r = (phase.routines || []).find(x => x.id === rid);
          if (!r) return;
          const st  = rLog[`${rid}|${iso}`];
          const col = CATS[r.cat] ? CATS[r.cat].color : 'var(--muted)';
          const op  = st === 'done' ? 1 : st === 'skip' ? 0.25 : 0.6;
          dots.push(`<span class="cal-dot" style="background:${col};opacity:${op}"></span>`);
        });
        (apptMap[iso] || []).forEach(a => {
          const col = CATS[a.cat] ? CATS[a.cat].color : 'var(--muted)';
          dots.push(`<span class="cal-dot appt" style="background:${col};${a.done ? 'opacity:.35' : ''}"></span>`);
        });
        if ((taskMap[iso] || []).length) dots.push(`<span class="cal-dot" style="background:var(--muted);opacity:.45"></span>`);
        if (dots.length) inner += `<span class="cal-dots">${dots.slice(0, 5).join('')}</span>`;
      }

      cells += `<div class="${cls.join(' ')}"${extraStyle ? ` style="${extraStyle}"` : ''} data-date="${iso}">${inner}</div>`;
    }

    return `<div class="cal-month">
      <div class="cal-month-label">${label}</div>
      <div class="cal-week-row"><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span></div>
      <div class="cal-grid">${cells}</div>
    </div>`;
  }).join('');
}

function buildLegend(phase, colorMap) {
  const sorted = (phase.goals||[]).slice().sort((a,b) => a.date < b.date ? -1 : 1);
  if (!sorted.length) return '';
  const items = sorted.map(g => {
    const ci = colorMap[g.id] ?? 0;
    const col = GOAL_PALETTE[ci % GOAL_PALETTE.length];
    return `<span class="legend-item"><span class="legend-dot" style="background:${col.color}"></span>${escapeHtml(g.title)}</span>`;
  }).join('');
  return `<div class="goal-legend">${items}</div>`;
}

// ── GOAL PROGRESS BLOCKS ───────────────────────────────────────────────────

function buildGoalBlocks(phase, dayPlan, colorMap) {
  const sorted = (phase.goals||[]).slice().sort((a,b) => a.date < b.date ? -1 : 1);
  if (!sorted.length) return '<div class="no-items">No goals yet — use + Add.</div>';

  const today = todayISO();
  return sorted.map(g => {
    const ci   = colorMap[g.id] ?? 0;
    const col  = GOAL_PALETTE[ci % GOAL_PALETTE.length];
    const days = daysUntil(g.date);
    const cls  = urgencyClass(days);

    // Day-plan progress: study days assigned to this goal
    const assigned = Object.entries(dayPlan).filter(([d, v]) => v === g.id).map(([d]) => d);
    const total    = assigned.length;
    const done     = assigned.filter(d => d < today).length;
    const pct      = total === 0 ? 0 : Math.round(done / total * 100);

    // User tasks
    const gTasks   = (phase.tasks||[]).filter(t => t.goalId === g.id);
    const tDone    = gTasks.filter(t => t.done).length;

    const taskRows = gTasks.length === 0 ? '' :
      `<div class="task-list">${gTasks.map(t => `
        <div class="task-item">
          <button class="task-check ${t.done?'is-done':''}" data-toggle="${t.id}">${svgCheck()}</button>
          <div class="task-body editable" data-edit-task="${t.id}">
            <div class="task-title ${t.done?'is-done':''}">${escapeHtml(t.title)}</div>
            ${t.date ? `<div class="task-sched">${t.userPlaced?'📌':'🗓'} ${fmtMed(t.date)}</div>` : '<div class="task-sched">Unscheduled</div>'}
          </div>
        </div>`).join('')}</div>`;

    const countLabel = total > 0
      ? `${done}/${total} study days${gTasks.length ? ` · ${tDone}/${gTasks.length} tasks` : ''}`
      : gTasks.length ? `${tDone}/${gTasks.length} tasks` : '';

    return `<div class="goal-block" data-gid="${g.id}">
      <div class="gb-header editable" data-edit-goal="${g.id}">
        <div class="gb-left">
          <div class="gb-name-row">
            <span class="goal-color-dot" style="background:${col.color}"></span>
            <span class="gb-title">${escapeHtml(g.title)}</span>
          </div>
          <div class="gb-sub">${fmtLong(g.date)}</div>
        </div>
        <div class="gb-right">
          ${countLabel ? `<span class="gb-count">${countLabel}</span>` : ''}
          <span class="countdown-badge ${cls}">${urgencyLabel(days)}</span>
          <span class="icon-btn edit-hint">${svgPencil()}</span>
        </div>
      </div>
      <div class="gb-progress">
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%;background:${col.color}"></div>
        </div>
      </div>
      ${taskRows}
    </div>`;
  }).join('');
}

function freqLabel(r) {
  return r.perWeekMin === r.perWeekMax ? `${r.perWeekMax}× / week` : `${r.perWeekMin}–${r.perWeekMax}× / week`;
}

function buildRoutineBlocks(phase) {
  const routines = phase.routines || [];
  if (!routines.length) return '<div class="no-items">No routines yet — use + Add.</div>';
  const today = todayISO();
  return routines.map(r => {
    const col    = CATS[r.cat] ? CATS[r.cat].color : 'var(--muted)';
    const target = r.perWeekMax || r.perWeekMin || 1;
    const done   = routineWeekProgress(phase, r, today);
    const pct    = Math.min(100, Math.round(done / target * 100));
    const met    = done >= (r.perWeekMin || target);
    return `<div class="goal-block" data-rid="${r.id}">
      <div class="gb-header editable" data-edit-routine="${r.id}">
        <div class="gb-left">
          <div class="gb-name-row">
            <span class="goal-color-dot" style="background:${col}"></span>
            <span class="gb-title">${escapeHtml(r.title)}</span>
          </div>
          <div class="gb-sub">${freqLabel(r)} · ${CATS[r.cat] ? CATS[r.cat].label : 'Other'}</div>
        </div>
        <div class="gb-right">
          <span class="gb-count">${done}/${target} this week${met ? ' ✓' : ''}</span>
          <span class="icon-btn edit-hint">${svgPencil()}</span>
        </div>
      </div>
      <div class="gb-progress">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>
    </div>`;
  }).join('');
}

function buildAppointmentBlocks(phase) {
  const appts = (phase.appointments || []).slice().sort((a, b) =>
    a.date === b.date ? ((a.time||'') < (b.time||'') ? -1 : 1) : (a.date < b.date ? -1 : 1));
  if (!appts.length) return '<div class="no-items">No appointments yet — use + Add.</div>';
  const today = todayISO();
  return appts.map(a => {
    const col  = CATS[a.cat] ? CATS[a.cat].color : 'var(--muted)';
    const days = daysUntil(a.date);
    const past = a.date < today;
    return `<div class="goal-block">
      <div class="gb-header editable" data-edit-appt="${a.id}" style="margin-bottom:0">
        <div class="gb-left">
          <div class="gb-name-row">
            <span class="goal-color-dot" style="background:${col}"></span>
            <span class="gb-title" ${a.done?'style="text-decoration:line-through;color:var(--faint)"':''}>${escapeHtml(a.title)}</span>
          </div>
          <div class="gb-sub">${fmtMed(a.date)}${a.time ? ` · ${a.time}` : ''}</div>
        </div>
        <div class="gb-right">
          <span class="countdown-badge ${past ? 'past' : urgencyClass(days)}">${urgencyLabel(days)}</span>
          <span class="icon-btn edit-hint">${svgPencil()}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openModal()  { document.getElementById('modal').style.display = 'flex'; }

function refreshCurrentView() {

// Step 2: the form — add (item null) or edit (item given).
function openEditor(type, item, presetDate) {

function fldTitle(item, ph) {

}
function fldCat(sel) {

function renderForm(type, item, presetDate) {
  const phase = phases.find(p => p.id === currentPhaseId) || {};
  let fields = '';

  if (type === 'goal') {
    fields = `${fldTitle(item, 'Goal name (e.g. Math exam)')}

    fields = `${fldTitle(item, 'Appointment (e.g. Dentist)')}

        <div class="field"><label>Date</label><input type="date" id="ed-date" value="${item ? item.date : (presetDate || '')}"></div>

    const dval = item ? (item.userPlaced && item.date ? item.date : '') : (presetDate || '');
    fields = `${fldTitle(item, 'Task (e.g. Buy groceries)')}
      <div class="field"><label>Linked goal (optional)</label><select id="ed-goal">${goalOpts}</select></div>
      ${fldEffort(item ? item.effort : 'normal')}
      <div class="field-row">
        <div class="field"><label>Day <span style="text-transform:none;font-weight:400">— empty = auto-plan</span></label><input type="date" id="ed-date" value="${dval}"></div>
        <div class="field"><label>Time <span style="text-transform:none;font-weight:400">— optional</span></label><input type="time" id="ed-time" value="${item ? (item.time || '') : ''}"></div>
      </div>`;
  }

    <div class="modal-actions">
      ${isEdit ? `<button class="btn danger" id="ed-delete" aria-label="Delete">${svgTrash()}</button>` : ''}
